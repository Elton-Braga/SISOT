<div class="principal">
  <h2 mat-dialog-title>Histórico</h2>

  <div class="cabecalho">
    <span>
      Emitido em:
      {{ dataEmissao | date: "dd/MM/yyyy HH:mm" : "" : "pt-BR" }}
    </span>
  </div>

  <mat-dialog-content>
    <table class="tabela-historico">
      <thead>
        <tr>
          <th>Data/Hora</th>
          <th>Usuário</th>
          <th>Peça</th>
          <th>Alterações</th>
          <th>Tipo</th>
        </tr>
      </thead>

      <tbody>
        @for (item of historico; track $index) {
          <tr>
            <td>{{ item.dataHora }}</td>

            <td>{{ item.usuario }}</td>

            <td>{{ item.peca }}</td>

            <td>{{ item.alteracoes }}</td>

            <td>{{ item.tipo }}</td>
          </tr>
        }
      </tbody>
    </table>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-flat-button color="primary" (click)="imprimir()">
      <mat-icon>print</mat-icon>
      Imprimir
    </button>

    <button mat-stroked-button color="primary" (click)="fechar()">
      <mat-icon>close</mat-icon>
      Fechar
    </button>
  </mat-dialog-actions>
</div>
